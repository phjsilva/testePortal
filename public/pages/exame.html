<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Prova | Portal Scrum</title>

    <link rel="stylesheet" href="../assets/css/base.css" />
    <link rel="stylesheet" href="../assets/css/exam.css" />

    <script src="../assets/js/theme.js" defer></script>
    <script src="../assets/js/api.js" defer></script>

    <!-- exame -->
    <script src="../assets/js/exam.js" defer></script>
  </head>

  <body>
    <div class="page">
      <header class="site-header">
        <div class="container header-row">
          <div class="header-title">
            <img
              class="brand-logo"
              src="../assets/images/logoBranca.png"
              alt="Logo STACKED"
              width="42"
              height="42"
            />

            <span>
              <strong>Prova de Certificação Scrum</strong>
            </span>
          </div>

          <div class="header-question-counter">
            <span data-question-count>Questão 1 de 10</span>
          </div>

          <!-- TIMER -->
          <!--
                    <div class="timer">
                        <span data-timer>30:00</span>
                    </div>
                    -->
        </div>

        <!-- BARRA DE PROGRESSO -->
        <div class="top-progress">
          <div class="progress-bar" data-exam-progress></div>
        </div>
      </header>

      <main class="container app-layout">
        <section class="exam-shell">
          <!-- QUESTÃO -->
          <article class="card question-card" data-question-shell>
            <div class="loading-state">Carregando questão...</div>
          </article>
        </section>
      </main>
    </div>
  </body>
</html>
