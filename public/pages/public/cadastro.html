<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>STACKED - Login</title>
        <link rel="stylesheet" href="../assets/css/style.css" />
        <link rel="stylesheet" href="../assets/css/login.css" />
        <link
            rel="shortcut icon"
            href="../assets/images/logoEscuro.png"
            type="image/x-icon"
        />
    </head>
    <body>
        <main class="container">
            <div class="logo logo-login">
                <img src="../assets/images/logoBranca.png" alt="Logo STACKED" />
            </div>
            <div class="form">
                <form id="form">
                    <div class="inputs">
                        <div class="input-box">
                            <label for="name">NOME COMPLETO</label>
                            <input
                                type="text"
                                id="name"
                                name="nome"
                                class="deactivated"
                            />
                            <span id="name-error">Digite seu nome</span>
                        </div>
                        <div class="input-box">
                            <div class="box-lgpd">
                                <label for="cpf" >CPF</label>
                                <div class="container-lgpd">
                                  <button class="botao">?</button>
                                  <div class="tooltip">O CPF está sendo utilizado como identificação única para obter a certificação ao final</div>
                                </div>
                              </div>
                            <input
                                type="text"
                                id="cpf"
                                name="cpf"
                                class="deactivated"
                            />
                            <span id="cpf-error">CPF inválido</span>
                        </div>
                        <div class="input-box">
                            <label for="email">EMAIL</label>
                            <input
                                type="email"
                                id="email"
                                name="email"
                                class="deactivated"
                            />
                            <span id="email-error">Email inválido</span>
                        </div>
                        <div class="input-box">
                            <label for="password ">SENHA</label>
                            <input
                                type="password"
                                id="password"
                                name="senha"
                                class="deactivated"
                            />
                            <span id="password-error">Digite sua senha</span>
                        </div>
                    </div>
                    <div class="actions">
                        <button type="submit" class="btn-main">
                            CADASTRE-SE
                        </button>
                        <div class="divider">
                            <span>OU</span>
                        </div>

                        <a href="login.html" class="btn-secondary"
                            >FAÇA LOGIN</a
                        >
                    </div>
                </form>
            </div>
        </main>
        <script src="../assets/js/authValidators.js"></script>
        <script src="../assets/js/api.js"></script>
        <script src="../assets/js/register.js"></script>
        <script src="../assets/js/script.js"></script>
    </body>
</html>
